server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 50m;

    client_max_body_size 50m;

    # WebSocket — long-lived connections need extended timeouts
    location /ws/ {
        proxy_pass http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Temp audio files served by FastAPI static mount (D-ID lip-sync source)
    location /audio/ {
        proxy_pass http://backend:8000/audio/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # REST API + FastAPI docs
    # Covers every registered router prefix: persona, personas (consent),
    # billing, health, ingest, creation, review, plus FastAPI auto-docs.
    location ~ ^/(persona|personas|billing|health|ingest|creation|review|docs|redoc|openapi\.json) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React SPA — unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
