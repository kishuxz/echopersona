services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Always use the Docker-internal Redis, not any external URL from .env
      - REDIS_URL=redis://redis:6379
      # Override CORS per environment; default to localhost for local dev
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      # VITE_ vars are baked into the JS bundle at build time.
      # WS base must match the public host so browsers can reach the socket.
      # Supabase client vars come from the same .env as the backend.
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
        - VITE_WS_BASE_URL=${VITE_WS_BASE_URL:-ws://localhost}
        - VITE_SUPABASE_URL=${SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  redis_data:
