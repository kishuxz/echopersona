services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      # Always use the Docker-internal Redis, not any external URL from .env
      - REDIS_URL=redis://redis:6379
      # Override CORS per environment; default to localhost for local dev
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  worker:
    build: ./backend
    command: arq worker.WorkerSettings
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        # VITE_ vars are baked into the JS bundle at build time.
        # Defaults to production values (kishoreai.online).
        # Override in root .env for local dev with Docker:
        #   VITE_API_BASE_URL=http://localhost:8000
        #   VITE_WS_BASE_URL=ws://localhost:8000
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-https://kishoreai.online}
        - VITE_WS_BASE_URL=${VITE_WS_BASE_URL:-wss://kishoreai.online}
        - VITE_SUPABASE_URL=${SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  redis_data:
