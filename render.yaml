# SECONDARY DEPLOYMENT TARGET — not the current primary.
# Primary target: private VPS at kishoreai.online using docker-compose.yml + VPS nginx.
# Use this file only if deploying to Render.com as an experimental/backup path.

services:
  - type: web
    name: echopersona-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ENVIRONMENT
        value: production
      # Set these in the Render dashboard — never commit secrets:
      # --- Supabase (required) ---
      # SUPABASE_URL               ← https://<project-ref>.supabase.co
      # SUPABASE_SERVICE_ROLE_KEY  ← service role key (backend only)
      # SUPABASE_ANON_KEY          ← anon key
      # --- AI services (required for live mode) ---
      # GROQ_API_KEY
      # ELEVENLABS_API_KEY
      # ELEVENLABS_VOICE_ID
      # DEEPGRAM_API_KEY
      # --- Redis (required; use Upstash TLS URL) ---
      # REDIS_URL                  ← rediss://default:<password>@<host>:<port>
      # --- CORS (required; set to your frontend domain) ---
      # CORS_ORIGINS               ← https://kishoreai.online (primary VPS) or https://echopersona.vercel.app (Vercel alt)
      # --- Public URL (required; used for D-ID audio file references) ---
      # PUBLIC_BASE_URL            ← https://echopersona-backend.onrender.com (Render) or https://kishoreai.online (VPS)
      # --- Optional media services ---
      # DID_API_KEY
      # SIMLI_API_KEY
      # CARTESIA_API_KEY
      # TTS_PROVIDER               ← elevenlabs (default) or cartesia
      # --- Stripe billing (paused — set when activating payments) ---
      # STRIPE_SECRET_KEY
      # STRIPE_WEBHOOK_SECRET
      # STRIPE_PRICE_CREATOR_MONTHLY
      # STRIPE_PRICE_LEGACY_MONTHLY
      # FRONTEND_BILLING_SUCCESS_URL  ← https://kishoreai.online/billing/success (primary VPS) or https://echopersona.vercel.app/billing/success (Vercel alt)
      # FRONTEND_BILLING_CANCEL_URL   ← https://kishoreai.online/billing/cancel (primary VPS) or https://echopersona.vercel.app/billing/cancel (Vercel alt)
